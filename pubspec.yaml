name: scam_detector
description: "AI-powered scam detection app for phone numbers, bank accounts, and URLs."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # AI - Gemini Flash
  google_generative_ai: ^0.4.6

  # Networking
  http: ^1.2.2

  # Local storage (history, cache)
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Env / config
  flutter_dotenv: ^5.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
